# HotpotQA closed-book multi-hop QA — filter-pass example.
#
# This example operates differently from examples/sarcasm: it filters
# an existing eval dataset rather than generating candidates from a
# hypothesis. The discrimination algorithm (decompose → generate →
# judge) does not fit cleanly here because (a) we use ExactMatchJudge
# against gold answers, not RubricJudge, and (b) candidates are
# pre-supplied (HotpotQA validation items), not LLM-generated.
#
# The filter pass therefore runs via:
#
#   python examples/hotpotqa/run_filter.py
#
# This config is preserved as documentation of the system shape (so
# `hypothesize list .` and `discover_systems` surface it) and to share
# the LLM/budget settings with the script. The script loads this YAML
# via `load_run_config` and uses `current.module_path`,
# `alternative.module_path`, `llm.default_model`, and `budget`.
#
# Note: AlternativeConfig has no `prompt_override` field. The script
# explicitly invokes the alternative runner with DECOMPOSE_PROMPT
# imported from system.py — see examples/hotpotqa/run_filter.py.

name: hotpotqa-multihop

current:
  adapter: python_module
  module_path: examples/hotpotqa/system.py
  entrypoint: run

alternative:
  adapter: python_module
  module_path: examples/hotpotqa/system.py
  entrypoint: run

hypothesis:
  text: >-
    the QA system fails on multi-hop questions requiring chained
    reasoning across two entities, where the intermediate entity is
    not named in the question
  context_refs: []

llm:
  default_model: claude-haiku-4-5-20251001
  max_tokens: 2048

budget:
  max_llm_calls: 200

defaults:
  target_n: 10
  min_required: 1
